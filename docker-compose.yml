# Chatwoot CE — self-hosted live chat. Exposes the customer widget
# script + agent admin app at chat.veebist.cloud through Traefik.
#
# Layout matches the other Veebist stacks under /home/claudeuser/stacks/
# on the VPS: one compose file per stack, Traefik labels on the public
# service, the rest internal. PostgreSQL + Redis are dedicated to this
# stack so an upgrade can't ripple into n8n/payload/medusa.
#
# Boot sequence (first time):
#   1. docker compose run --rm rails bundle exec rails db:chatwoot_prepare
#   2. docker compose up -d
#   3. Visit https://chat.veebist.cloud → register the first user (becomes admin)
#   4. Disable account signup in the admin → System → Settings to lock it down

x-base: &base
  image: chatwoot/chatwoot:v3.16.0
  env_file: .env
  restart: always
  volumes:
    - storage:/app/storage
  networks:
    - chatwoot
    - traefik-public

services:
  rails:
    <<: *base
    container_name: chatwoot-rails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.chatwoot.rule=Host(`chat.veebist.cloud`)
      - traefik.http.routers.chatwoot.tls=true
      - traefik.http.routers.chatwoot.entrypoints=web,websecure
      - traefik.http.routers.chatwoot.tls.certresolver=mytlschallenge
      - traefik.http.services.chatwoot.loadbalancer.server.port=3000
      # No Authelia in front — the website widget JS has to load
      # cross-site from the storefront. Chatwoot's own auth protects
      # the admin app.

  sidekiq:
    <<: *base
    container_name: chatwoot-sidekiq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    labels:
      - traefik.enable=false

  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot-postgres
    restart: always
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: chatwoot
      # Read from .env so we don't bake creds into the compose file
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - chatwoot
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatwoot']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatwoot-redis
    restart: always
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis:/data
    networks:
      - chatwoot

  # Veebist AI chat-bot — bridges Chatwoot website inbox to Claude CLI.
  # Mounts the operator's Claude Code CLI + auth state from the host so
  # responses use the existing Claude subscription (no per-token API
  # cost). Same pattern kusimusi uses for its coding assistant.
  chat-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: chat-bot
    restart: always
    environment:
      # FORCE_SSL=true on Chatwoot makes Puma 301 every HTTP request to
       # HTTPS, but Puma itself doesn't speak TLS — the upgrade ends in a
       # handshake-against-plain-HTTP error inside the Docker network.
       # Use the public Traefik endpoint instead; it's a fast loopback and
       # cleanly TLS-terminated.
      CHATWOOT_URL: https://chat.veebist.cloud
      CHATWOOT_API_TOKEN: ${BOT_CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: ${BOT_CHATWOOT_ACCOUNT_ID:-1}
      KNOWLEDGE_PATH: /app/knowledge
      PORT: 3500
    volumes:
      # Knowledge per site (markdown files named <inbox-slug>.md)
      - ./bot/knowledge:/app/knowledge:ro
      # Claude CLI + auth state, mounted read-only from the host. Files
      # are owned by host UID 1001 (claudeuser); the bot container also
      # runs as UID 1001 so reads work without permission errors.
      - /home/claudeuser/.local/bin/claude:/home/app/bin/claude:ro
      - /home/claudeuser/.local/share/claude:/home/app/.local/share/claude:ro
      - /home/claudeuser/.claude:/home/app/.claude:ro
      - /home/claudeuser/.claude.json:/home/app/.claude.json:ro
    depends_on:
      - rails
    networks:
      - chatwoot          # talks to Chatwoot at http://rails:3000
      - traefik-public    # exposed at chat-bot.veebist.cloud for testing
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.chat-bot.rule=Host(`chat-bot.veebist.cloud`)
      - traefik.http.routers.chat-bot.tls=true
      - traefik.http.routers.chat-bot.entrypoints=web,websecure
      - traefik.http.routers.chat-bot.tls.certresolver=mytlschallenge
      - traefik.http.services.chat-bot.loadbalancer.server.port=3500

volumes:
  storage:
  postgres:
  redis:

networks:
  chatwoot:
    driver: bridge
  traefik-public:
    external: true
